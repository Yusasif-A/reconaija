version: '3.8'

services:
  reconaija-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: reconaija-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8000}
    depends_on:
      - mysql
    networks:
      - reconaija-network

  reconaija-frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: reconaija-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - reconaija-backend
    networks:
      - reconaija-network

  mysql:
    image: mysql:8.0
    container_name: reconaija-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - reconaija-network

networks:
  reconaija-network:
    driver: bridge

volumes:
  mysql-data:
